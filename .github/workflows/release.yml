name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to package
        required: true
        default: v0.1.0.0-AMC20260502.6

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Resolve release tag
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.tag }}" } else { "${{ github.ref_name }}" }
          "AMCHIPPER_RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\amChipper.sln

      - name: Build
        run: dotnet build .\amChipper.sln -c Release -p:Platform=x64 --no-restore

      - name: Test
        run: dotnet test .\amChipper.sln -c Release -p:Platform=x64 --no-build

      - name: Publish
        run: dotnet publish .\src\amChipper.App\amChipper.App.csproj -c Release -r win-x64 --self-contained false -p:Platform=x64 -o .\Ready2Release

      - name: Publish language tool
        run: dotnet publish .\src\amChipper.LanguageTool\amChipper.LanguageTool.csproj -c Release -r win-x64 --self-contained false -p:Platform=x64 -o .\Ready2Release\tools

      - name: Export language packs
        run: .\Ready2Release\tools\amChipper.LanguageTool.exe export --output .\Ready2Release\lang

      - name: Add release documents and libopenmpt runtime
        shell: pwsh
        run: |
          Copy-Item -LiteralPath .\README.md,.\RELEASE_NOTES.md,.\CHANGELOG.md,.\LICENSE -Destination .\Ready2Release -Force

          $libs = Join-Path $PWD "Ready2Release\libs"
          New-Item -ItemType Directory -Path $libs -Force | Out-Null
          $url = "https://lib.openmpt.org/files/libopenmpt/dev/libopenmpt-0.8.6+release.dev.windows.vs2022.zip"
          $zipPath = Join-Path $env:TEMP ("amchipper-libopenmpt-" + [guid]::NewGuid().ToString("N") + ".zip")
          Invoke-WebRequest -Uri $url -OutFile $zipPath -UserAgent "amChipperReleaseWorkflow/0.2"
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead($zipPath)
          try {
            $entries = @($zip.Entries | Where-Object { $_.FullName -like "bin/amd64/*.dll" })
            if ($entries.Count -eq 0) {
              throw "No bin/amd64 DLLs were found in the libopenmpt archive."
            }
            foreach ($entry in $entries) {
              [System.IO.Compression.ZipFileExtensions]::ExtractToFile($entry, (Join-Path $libs $entry.Name), $true)
            }
          }
          finally {
            $zip.Dispose()
            Remove-Item -LiteralPath $zipPath -Force -ErrorAction SilentlyContinue
          }

      - name: Package
        shell: pwsh
        run: |
          $zip = "amChipper-${{ env.AMCHIPPER_RELEASE_TAG }}-win-x64.zip"
          Compress-Archive -Path .\Ready2Release\* -DestinationPath $zip -Force
          "AMCHIPPER_RELEASE_ZIP=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: amChipper-${{ env.AMCHIPPER_RELEASE_TAG }}-win-x64
          path: ${{ env.AMCHIPPER_RELEASE_ZIP }}

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ env.AMCHIPPER_RELEASE_TAG }}"
          $zip = "${{ env.AMCHIPPER_RELEASE_ZIP }}"
          $notes = Get-Content .\RELEASE_NOTES.md -Raw
          $repo = "${{ github.repository }}"

          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $zip --repo $repo --clobber

            # Normalize earlier failed runs that may have left a hidden draft or prerelease
            # entry behind. The Releases page should show a normal public/private release.
            $release = gh api "repos/$repo/releases/tags/$tag" | ConvertFrom-Json
            $payload = @{
              name = "amChipper $tag"
              body = $notes
              draft = $false
              prerelease = $false
              make_latest = "legacy"
            } | ConvertTo-Json
            $payload | gh api -X PATCH "repos/$repo/releases/$($release.id)" --input -
          }
          else {
            gh release create $tag $zip --repo $repo --title "amChipper $tag" --notes "$notes" --verify-tag
          }
