name: .NET

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\amChipper.sln

      - name: Build
        run: dotnet build .\amChipper.sln -c Release -p:Platform=x64 --no-restore

      - name: Test
        run: dotnet test .\amChipper.sln -c Release -p:Platform=x64 --no-build

      - name: Publish app
        if: startsWith(github.ref, 'refs/tags/')
        run: dotnet publish .\src\amChipper.App\amChipper.App.csproj -c Release -r win-x64 --self-contained false -p:Platform=x64 -o .\Ready2Release

      - name: Package release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "amChipper-$tag-win-x64.zip"
          Compress-Archive -Path .\Ready2Release\* -DestinationPath $zip -Force
          "AMCHIPPER_RELEASE_ZIP=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: amChipper-${{ github.ref_name }}-win-x64
          path: ${{ env.AMCHIPPER_RELEASE_ZIP }}

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" "${{ env.AMCHIPPER_RELEASE_ZIP }}" `
            --repo "${{ github.repository }}" `
            --title "amChipper ${{ github.ref_name }}" `
            --notes-file ".\RELEASE_NOTES.md" `
            --latest `
            --verify-tag
